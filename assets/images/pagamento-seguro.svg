<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180" role="img" aria-labelledby="title desc">
  <title id="title">Pagamento seguro</title>
  <desc id="desc">Banner local de pagamento seguro com cartoes, pix e garantia.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f1"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="900" height="180" rx="24" fill="url(#bg)"/>
  <rect x="20" y="20" width="860" height="140" rx="18" fill="#fff" stroke="#dbe7e1" stroke-width="2"/>
  <circle cx="94" cy="90" r="45" fill="url(#green)"/>
  <path d="M76 91.5 88.5 104 115 75" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="72" font-family="Montserrat, Arial, sans-serif" font-size="32" font-weight="800" fill="#111827">PAGAMENTO 100% SEGURO</text>
  <text x="160" y="108" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="600" fill="#4b5563">Compra protegida • Acesso imediato • Garantia de 7 dias</text>
  <g transform="translate(600 50)">
    <rect x="0" y="0" width="84" height="52" rx="10" fill="#1f2937"/>
    <rect x="10" y="14" width="64" height="8" rx="4" fill="#f59e0b"/>
    <rect x="10" y="33" width="38" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="100" y="0" width="84" height="52" rx="10" fill="#2563eb"/>
    <circle cx="132" cy="26" r="14" fill="#f97316" opacity=".92"/>
    <circle cx="152" cy="26" r="14" fill="#ef4444" opacity=".92"/>
    <rect x="200" y="0" width="84" height="52" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="242" y="33" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="900" fill="#059669">PIX</text>
  </g>
